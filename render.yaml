services:
  - type: web
    name: tracker
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DB_DRIVER
        value: sqlite
      - key: SQLITE_PATH
        value: /var/data/class_tracker.db
    disk:
      name: tracker-data
      mountPath: /var/data
      sizeGB: 1
